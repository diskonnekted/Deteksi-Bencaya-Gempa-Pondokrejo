<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Log Getaran - Monitoring Bahaya Gempa</title>
    <style>
      :root {
        --bg: #06070a;
        --border: #202532;
        --text: #e8ecf3;
        --muted: #a6afbf;
        --cyan: #00d3ff;
        --warn: #ffb020;
        --bad: #ff3b3b;
        --panel: rgba(10, 12, 17, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: radial-gradient(1200px 900px at 20% 0%, #0b1020 0%, var(--bg) 55%);
        color: var(--text);
      }

      header {
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(20, 26, 40, 0.8) 0%, rgba(8, 10, 14, 0.5) 100%);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(6px);
      }

      .row {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 14px;
        align-items: center;
      }

      .title {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }

      .title h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: 0.4px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .controls {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      select {
        font: inherit;
        font-size: 12px;
        color: var(--text);
        background: rgba(6, 7, 10, 0.55);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 10px;
        outline: none;
      }

      a.btn,
      button.btn {
        font: inherit;
        font-size: 12px;
        color: var(--text);
        background: rgba(0, 211, 255, 0.14);
        border: 1px solid rgba(0, 211, 255, 0.3);
        border-radius: 10px;
        padding: 7px 10px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }

      main {
        padding: 16px 18px 22px;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        overflow: hidden;
      }

      .panelHeader {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 12px;
        background: rgba(13, 16, 22, 0.8);
        border-bottom: 1px solid var(--border);
        gap: 10px;
        flex-wrap: wrap;
      }

      .panelHeader h2 {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.2px;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .summary {
        padding: 12px;
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 10px;
      }

      .card {
        border: 1px solid var(--border);
        background: rgba(6, 7, 10, 0.5);
        border-radius: 12px;
        padding: 10px;
      }

      .k {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }

      .v {
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .v small {
        font-size: 12px;
        color: var(--muted);
        margin-left: 6px;
      }

      .chartWrap {
        padding: 12px;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 360px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(6, 7, 10, 0.5);
        display: block;
      }

      .legend {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        padding: 0 12px 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .legendItem {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      #tip {
        position: absolute;
        inset: auto auto 16px 16px;
        min-width: 200px;
        max-width: 320px;
        padding: 10px;
        border: 1px solid var(--border);
        background: rgba(6, 7, 10, 0.85);
        border-radius: 12px;
        color: var(--text);
        font-size: 12px;
        display: none;
        pointer-events: none;
      }

      #tip .muted {
        color: var(--muted);
      }

      @media (max-width: 980px) {
        .row {
          grid-template-columns: 1fr;
          gap: 10px;
        }
        .controls {
          justify-content: flex-start;
        }
        .summary {
          grid-template-columns: 1fr 1fr;
        }
        canvas {
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <div class="title">
          <h1>Log Getaran Gempa</h1>
          <div class="subtitle">Grafik ringkasan event MMI (data dari log dashboard, retensi 7 hari)</div>
        </div>
        <div class="controls">
          <select id="range">
            <option value="1">Per hari</option>
            <option value="3">Per 3 hari</option>
            <option value="7" selected>Perminggu</option>
            <option value="30">Per bulan</option>
          </select>
          <button id="btnReload" class="btn" type="button">Refresh</button>
          <a class="btn" href="./seismo_dashboard_web.html">Kembali</a>
        </div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panelHeader">
          <h2>Grafik Peak (m/s²)</h2>
          <div class="meta" id="meta">-</div>
        </div>
        <div class="summary">
          <div class="card">
            <div class="k">Total event</div>
            <div class="v" id="sumTotal">0</div>
          </div>
          <div class="card">
            <div class="k">WARN (MMI 5–6)</div>
            <div class="v" id="sumWarn">0</div>
          </div>
          <div class="card">
            <div class="k">ALERT (MMI ≥ 7)</div>
            <div class="v" id="sumAlert">0</div>
          </div>
          <div class="card">
            <div class="k">MMI maksimum</div>
            <div class="v" id="sumMaxMmi">1</div>
          </div>
          <div class="card">
            <div class="k">Peak maksimum</div>
            <div class="v" id="sumMaxPeak">0.000 <small>m/s²</small></div>
          </div>
        </div>
        <div class="chartWrap">
          <canvas id="chart"></canvas>
          <div id="tip"></div>
        </div>
        <div class="legend">
          <span class="legendItem"><span class="swatch" style="background: rgba(0, 211, 255, 0.95)"></span>Peak (max)</span>
          <span class="legendItem"><span class="swatch" style="background: rgba(255, 176, 32, 0.9)"></span>WARN point</span>
          <span class="legendItem"><span class="swatch" style="background: rgba(255, 59, 59, 0.9)"></span>ALERT point</span>
          <span class="legendItem"><span class="swatch" style="background: rgba(122, 127, 143, 0.35)"></span>Grid</span>
        </div>
      </section>
    </main>

    <script>
      const LOG_STORAGE_KEY = "seismo_alert_log_v1";
      const LOG_RETENTION_MS = 7 * 24 * 60 * 60 * 1000;
      const LOG_MAX_ITEMS = 3000;

      const els = {
        range: document.getElementById("range"),
        btnReload: document.getElementById("btnReload"),
        meta: document.getElementById("meta"),
        sumTotal: document.getElementById("sumTotal"),
        sumWarn: document.getElementById("sumWarn"),
        sumAlert: document.getElementById("sumAlert"),
        sumMaxMmi: document.getElementById("sumMaxMmi"),
        sumMaxPeak: document.getElementById("sumMaxPeak"),
        chart: document.getElementById("chart"),
        tip: document.getElementById("tip")
      };

      const state = {
        buckets: [],
        hoverIndex: -1,
        lastRangeDays: 7
      };

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function toFixed3(n) {
        if (!Number.isFinite(n)) return "0.000";
        return n.toFixed(3);
      }

      function loadStoredLogs() {
        try {
          const raw = localStorage.getItem(LOG_STORAGE_KEY);
          const data = raw ? JSON.parse(raw) : [];
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function saveStoredLogs(items) {
        try {
          localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(items));
        } catch {}
      }

      function pruneLogs(items) {
        const now = Date.now();
        const keepAfter = now - LOG_RETENTION_MS;
        const pruned = items.filter((x) => x && typeof x.ts === "number" && x.ts >= keepAfter);
        if (pruned.length > LOG_MAX_ITEMS) return pruned.slice(pruned.length - LOG_MAX_ITEMS);
        return pruned;
      }

      function ensurePrunedOnce() {
        const items = pruneLogs(loadStoredLogs());
        saveStoredLogs(items);
        return items;
      }

      function startOfHour(ts) {
        const d = new Date(ts);
        d.setMinutes(0, 0, 0);
        return d.getTime();
      }

      function startOfDay(ts) {
        const d = new Date(ts);
        d.setHours(0, 0, 0, 0);
        return d.getTime();
      }

      function fmtLabel(ts, granularity) {
        const d = new Date(ts);
        if (granularity === "hour") {
          const hh = String(d.getHours()).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          return `${dd}/${mm} ${hh}:00`;
        }
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        return `${dd}/${mm}`;
      }

      function buildBuckets(rangeDays) {
        const now = Date.now();
        const from = now - rangeDays * 24 * 60 * 60 * 1000;
        const granularity = rangeDays <= 3 ? "hour" : "day";
        const bucketMs = granularity === "hour" ? 60 * 60 * 1000 : 24 * 60 * 60 * 1000;

        const start = granularity === "hour" ? startOfHour(from) : startOfDay(from);
        const end = granularity === "hour" ? startOfHour(now) : startOfDay(now);
        const count = Math.max(1, Math.floor((end - start) / bucketMs) + 1);

        const buckets = [];
        for (let i = 0; i < count; i++) {
          const ts = start + i * bucketMs;
          buckets.push({
            ts,
            label: fmtLabel(ts, granularity),
            warn: 0,
            alert: 0,
            maxMmi: 1,
            maxPeak: 0
          });
        }

        const items = ensurePrunedOnce();
        let total = 0;
        let warnTotal = 0;
        let alertTotal = 0;
        let maxMmi = 1;
        let maxPeak = 0;
        let lastEventTs = 0;

        for (const it of items) {
          const ts = Number(it.ts);
          if (!Number.isFinite(ts) || ts < from) continue;
          const mmi = clamp(Number(it.mmi) || 1, 1, 12);
          const peak = Number(it.peak) || 0;

          total += 1;
          if (ts > lastEventTs) lastEventTs = ts;
          if (mmi > maxMmi) maxMmi = mmi;
          if (peak > maxPeak) maxPeak = peak;

          const k = Math.floor((ts - start) / bucketMs);
          if (k < 0 || k >= buckets.length) continue;

          if (mmi >= 7) {
            buckets[k].alert += 1;
            alertTotal += 1;
          } else if (mmi >= 5) {
            buckets[k].warn += 1;
            warnTotal += 1;
          } else {
            continue;
          }

          buckets[k].maxMmi = Math.max(buckets[k].maxMmi, mmi);
          buckets[k].maxPeak = Math.max(buckets[k].maxPeak, peak);
        }

        const lastLabel = lastEventTs ? new Date(lastEventTs).toLocaleString() : "-";
        els.sumTotal.textContent = String(total);
        els.sumWarn.textContent = String(warnTotal);
        els.sumAlert.textContent = String(alertTotal);
        els.sumMaxMmi.textContent = String(maxMmi);
        els.sumMaxPeak.innerHTML = `${toFixed3(maxPeak)} <small>m/s²</small>`;

        els.meta.textContent = `Range: ${rangeDays} hari | Bucket: ${granularity} | Last event: ${lastLabel}`;

        state.buckets = buckets;
        state.lastRangeDays = rangeDays;
        state.hoverIndex = -1;
      }

      function resizeCanvas(canvas) {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = canvas.getBoundingClientRect();
        const w = Math.max(1, Math.floor(rect.width * dpr));
        const h = Math.max(1, Math.floor(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
      }

      function draw() {
        const canvas = els.chart;
        resizeCanvas(canvas);
        const ctx = canvas.getContext("2d");
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        const buckets = state.buckets;
        if (!buckets.length) return;

        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const pad = Math.floor(18 * dpr);
        const plotX0 = pad;
        const plotY0 = pad;
        const plotW = w - pad * 2;
        const plotH = h - pad * 2;

        let yMax = 0;
        for (const b of buckets) yMax = Math.max(yMax, Number(b.maxPeak) || 0);
        yMax = Math.max(0.15, yMax);

        ctx.save();
        ctx.strokeStyle = "rgba(122,127,143,0.20)";
        ctx.lineWidth = 1;
        const gridLines = 6;
        for (let i = 0; i <= gridLines; i++) {
          const y = plotY0 + (plotH * i) / gridLines;
          ctx.beginPath();
          ctx.moveTo(plotX0, y);
          ctx.lineTo(plotX0 + plotW, y);
          ctx.stroke();
        }
        ctx.restore();

        function yScale(v) {
          const t = v / yMax;
          return plotY0 + plotH * (1 - t);
        }

        const n = buckets.length;
        const dx = n === 1 ? 0 : plotW / (n - 1);

        function xScale(i) {
          return plotX0 + dx * i;
        }

        ctx.save();
        ctx.strokeStyle = "rgba(0, 211, 255, 0.95)";
        ctx.lineWidth = 2 * dpr;
        ctx.beginPath();
        ctx.moveTo(xScale(0), yScale(Number(buckets[0].maxPeak) || 0));
        for (let i = 1; i < n; i++) {
          ctx.lineTo(xScale(i), yScale(Number(buckets[i].maxPeak) || 0));
        }
        ctx.stroke();
        ctx.restore();

        for (let i = 0; i < n; i++) {
          const b = buckets[i];
          const peak = Number(b.maxPeak) || 0;
          const hasEvent = (b.warn + b.alert) > 0;
          const x = xScale(i);
          const y = yScale(peak);

          const isAlert = b.maxMmi >= 7;
          const isWarn = b.maxMmi >= 5 && b.maxMmi < 7;
          const color = isAlert ? "rgba(255, 59, 59, 0.95)" : isWarn ? "rgba(255, 176, 32, 0.95)" : "rgba(166,175,191,0.55)";

          ctx.save();
          ctx.fillStyle = color;
          ctx.globalAlpha = hasEvent ? 1 : 0.35;
          const r = (hasEvent ? 4.5 : 3.5) * dpr;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (i === state.hoverIndex) {
            ctx.save();
            ctx.strokeStyle = "rgba(0,211,255,0.55)";
            ctx.lineWidth = 2 * dpr;
            ctx.beginPath();
            ctx.arc(x, y, 7.5 * dpr, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }

        ctx.save();
        ctx.fillStyle = "rgba(166,175,191,0.95)";
        ctx.font = `${Math.floor(11 * dpr)}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace`;
        ctx.fillText(`Peak max per bucket, yMax=${yMax.toFixed(3)} m/s²`, plotX0, plotY0 + Math.floor(11 * dpr));
        ctx.restore();
      }

      function findIndexFromClientX(clientX) {
        const canvas = els.chart;
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const buckets = state.buckets;
        if (!buckets.length) return -1;
        const n = buckets.length;
        const barTotal = rect.width / n;
        const idx = Math.floor(x / barTotal);
        if (idx < 0 || idx >= n) return -1;
        return idx;
      }

      function showTip(idx, clientX, clientY) {
        const b = state.buckets[idx];
        if (!b) return;
        const total = b.warn + b.alert;
        const html =
          `<div><b>${b.label}</b></div>` +
          `<div class="muted">WARN: ${b.warn} | ALERT: ${b.alert} | Total: ${total}</div>` +
          `<div class="muted">Max MMI: ${b.maxMmi} | Max peak: ${toFixed3(b.maxPeak)} m/s²</div>`;
        els.tip.innerHTML = html;
        els.tip.style.display = "block";
        const wrap = els.tip.parentElement.getBoundingClientRect();
        const x = clamp(clientX - wrap.left + 12, 12, wrap.width - 12);
        const y = clamp(clientY - wrap.top + 12, 12, wrap.height - 12);
        els.tip.style.transform = `translate(${Math.floor(x)}px, ${Math.floor(y)}px)`;
      }

      function hideTip() {
        els.tip.style.display = "none";
      }

      function refresh() {
        const rangeDays = clamp(Number(els.range.value) || 7, 1, 30);
        buildBuckets(rangeDays);
        draw();
      }

      els.btnReload.addEventListener("click", refresh);
      els.range.addEventListener("change", refresh);
      window.addEventListener("resize", draw);

      els.chart.addEventListener("mousemove", (e) => {
        const idx = findIndexFromClientX(e.clientX);
        if (idx !== state.hoverIndex) {
          state.hoverIndex = idx;
          draw();
        }
        if (idx >= 0) showTip(idx, e.clientX, e.clientY);
        else hideTip();
      });
      els.chart.addEventListener("mouseleave", () => {
        state.hoverIndex = -1;
        hideTip();
        draw();
      });

      refresh();
    </script>
  </body>
</html>
